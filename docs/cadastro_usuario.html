<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Usuário</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login">
    <h1>Cadastrar Usuário</h1>

    <form id="formCadastro">

        <div class="campo">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" placeholder="Nome Completo" required>
        </div>

        <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="E-mail" required>
        </div>
    
        <div class="campo">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="9xxxxxxxx" pattern="[0-9]{9}" required>
        </div>

        <div class="campo">
            <label for="usuario">Usuário</label>
            <input type="text" id="usuario" name="usuario" required placeholder="Nome de usuário">
        </div>

        <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required placeholder="Senha">
        </div>

        <div class="campo">
            <label for="confirmarSenha">Confirmar Senha</label>
            <input type="password" id="confirmarSenha" required placeholder="Repita a senha">
        </div>

        <div class="campo">
            <label for="tipo">Gênero</label>
            <select id="genero" name="genero">
                <option value="Masculino">Masculino</option>
                <option value="Feminino">Feminino</option>
            </select>
        </div>

        <div class="campo">
            <select name="tipo" id="tipo">
                <option value="Operador">Operador de Stock</option>
            </select>
            </div>

        <button type="submit" id="btnCadastrar">Cadastrar</button>
        <div class="sessacao"><a href="login.html">Já tenho conta</a></div>
        <a href="index.html" class="voltar">Voltar</a>

        <div id="mensagem" class="alerta" style="display:none;"></div>

    </form>
    </div>

    <script src="js/config.js" defer></script>
    <script src="js/cadastro.js" defer></script>

</body>
</html>
